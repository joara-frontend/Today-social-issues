name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint / Type Check / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: npm run build
